<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة العمليات والمراقبة الأمنية | Security Operations Center</title>
    
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
        }

        #map {
            height: 100%;
            width: 100%;
            border-radius: 1rem;
            z-index: 1;
        }

        /* تخصيص مؤشرات الدبابيس على الخريطة */
        .custom-gps-marker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .custom-gps-marker.normal { background-color: #10b981; }
        .custom-gps-marker.warning { background-color: #f59e0b; }
        .custom-gps-marker.sos {
            background-color: #ef4444;
            animation: pulse-marker 1s infinite;
        }

        @keyframes pulse-marker {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* بطاقات القائمة الجانبية */
        .employee-card {
            background-color: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(51, 65, 85, 0.8);
            border-radius: 0.75rem;
            padding: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .employee-card:hover {
            background-color: rgba(51, 65, 85, 0.9);
            border-color: #3b82f6;
        }
        .employee-card.active-focus {
            border-color: #3b82f6;
            background-color: rgba(30, 58, 138, 0.4);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        /* نقاط الحالة الملونة */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.normal { background-color: #10b981; }
        .status-dot.warning { background-color: #f59e0b; }
        .status-dot.sos { background-color: #ef4444; animation: ping 1s infinite; }

        /* حركة التحديث التلقائي */
        .refreshing { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* تخصيص Popups خريطة Leaflet */
        .leaflet-popup-content-wrapper {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border-radius: 0.75rem !important;
            border: 1px solid #475569;
        }
        .leaflet-popup-tip { background-color: #1e293b !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- شريط الإنذار العلوي العاجل (SOS Banner) -->
    <div id="sosBanner" class="hidden bg-red-600 text-white px-4 py-2.5 flex justify-between items-center animate-bounce shadow-lg z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="siren" class="w-6 h-6 animate-pulse"></i>
            <span class="font-bold text-sm md:text-base" id="sosBannerMessage">طوارئ نشطة!</span>
        </div>
        <button id="muteAlarmBtn" class="bg-red-800 hover:bg-red-900 px-3 py-1 rounded-lg text-xs font-semibold flex items-center gap-1">
            <i id="muteIcon" data-lucide="volume-2" class="w-4 h-4"></i>
            <span>كتم/تفعيل</span>
        </button>
    </div>

    <!-- Header / Navbar -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 flex flex-col md:flex-row justify-between items-center gap-4 z-40">
        <div class="flex items-center gap-3">
            <div class="p-2.5 bg-blue-600/20 text-blue-400 rounded-xl border border-blue-500/30">
                <i data-lucide="shield-alert" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-bold text-white flex items-center gap-2">
                    مركز المراقبة والأمان المباشر
                    <i id="refreshIndicator" data-lucide="rotate-cw" class="w-4 h-4 text-slate-400"></i>
                </h1>
                <p class="text-xs text-slate-400">تتبع حي ومباشر عبر Wear OS Suite</p>
            </div>
        </div>

        <!-- إعدادات إضافية في الهيدر -->
        <div class="flex items-center gap-3 w-full md:w-auto overflow-x-auto">
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-xs">
                <i data-lucide="link" class="w-4 h-4 text-slate-400"></i>
                <input type="text" id="apiUrlInput" class="bg-transparent text-slate-200 outline-none w-40 md:w-64 text-xs" placeholder="رابط الـ API..." value="https://script.google.com/macros/s/AKfycbznf_WNaBMMbHnR1ZiP8QLG2BX80rU__OjlYs3_kWFirLfGVGo2toe0wKOOGAZxYUNthA/exec">
            </div>

            <label class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-xs cursor-pointer select-none">
                <input type="checkbox" id="autoRefreshToggle" checked class="rounded border-slate-700 text-blue-600 focus:ring-0">
                <span>تحديث تلقائي</span>
            </label>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden p-3 gap-3">
        
        <!-- Sidebar (Left Column) -->
        <aside class="w-full lg:w-80 flex flex-col gap-3 h-full overflow-hidden">
            
            <!-- KPIs Bar -->
            <div class="grid grid-cols-4 gap-2 bg-slate-900 p-3 rounded-xl border border-slate-800 text-center">
                <div>
                    <span class="block text-[10px] text-slate-400">الكل</span>
                    <span id="statTotal" class="font-bold text-blue-400 text-sm">0</span>
                </div>
                <div>
                    <span class="block text-[10px] text-slate-400">طبيعي</span>
                    <span id="statNormal" class="font-bold text-emerald-400 text-sm">0</span>
                </div>
                <div>
                    <span class="block text-[10px] text-slate-400">تحذير</span>
                    <span id="statWarning" class="font-bold text-amber-400 text-sm">0</span>
                </div>
                <div>
                    <span class="block text-[10px] text-slate-400">SOS</span>
                    <span id="statSos" class="font-bold text-red-500 text-sm">0</span>
                </div>
            </div>

            <!-- Search Input -->
            <div class="relative">
                <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute right-3 top-3"></i>
                <input type="text" id="searchInput" placeholder="بحث بالاسم أو الرقم..." class="w-full bg-slate-900 border border-slate-800 rounded-xl pr-9 pl-3 py-2 text-xs text-slate-200 outline-none focus:border-blue-500">
            </div>

            <!-- Employee List Feed -->
            <div class="flex-1 overflow-y-auto space-y-2 pr-1" id="employeeList">
                <div class="text-center text-slate-500 py-10 text-xs">
                    جاري جلب بيانات الموظفين...
                </div>
            </div>
        </aside>

        <!-- Map & Detail Panel Area (Center & Right Column) -->
        <main class="flex-1 relative h-full flex flex-col">
            
            <!-- Map Container -->
            <div id="map" class="shadow-inner"></div>

            <!-- Floating Detail Panel (لوحة التفاصيل العائمة) -->
            <div id="detailPanel" class="hidden absolute bottom-4 right-4 left-4 md:left-auto md:w-96 bg-slate-900/90 backdrop-blur border border-slate-700 p-4 rounded-2xl shadow-2xl z-20 transition-all duration-300">
                <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                    <div class="flex items-center gap-2">
                        <span id="detailStatusDot" class="status-dot normal"></span>
                        <div>
                            <h3 id="detailName" class="font-bold text-white text-base">اسم الموظف</h3>
                            <span id="detailId" class="text-xs text-slate-400">#ID</span>
                        </div>
                    </div>
                    <button id="closeDetailBtn" class="text-slate-400 hover:text-white p-1">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Emergency Dispatcher Box -->
                <div id="responderBox" class="hidden mb-3 p-2.5 bg-red-950/60 border border-red-600/60 rounded-xl text-xs text-red-300 flex items-center gap-2">
                    <i data-lucide="ambulance" class="w-5 h-5 text-red-500"></i>
                    <div>
                        <span class="block text-[10px] text-red-400">أقرب حارس أمن موجه للموقع:</span>
                        <strong id="detailResponder" class="text-white text-xs">لا يوجد</strong>
                    </div>
                </div>

                <!-- Grid Details -->
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="bg-slate-800/60 p-2 rounded-lg border border-slate-700/50">
                        <span class="text-slate-400 block text-[10px]">النبض</span>
                        <span id="detailHeartRate" class="font-bold text-emerald-400">0 BPM</span>
                    </div>
                    <div class="bg-slate-800/60 p-2 rounded-lg border border-slate-700/50">
                        <span class="text-slate-400 block text-[10px]">البطارية</span>
                        <span id="detailBattery" class="font-bold text-blue-400">100%</span>
                    </div>
                    <div class="bg-slate-800/60 p-2 rounded-lg border border-slate-700/50">
                        <span class="text-slate-400 block text-[10px]">الخطوات</span>
                        <span id="detailSteps" class="font-bold text-slate-200">0</span>
                    </div>
                    <div class="bg-slate-800/60 p-2 rounded-lg border border-slate-700/50">
                        <span class="text-slate-400 block text-[10px]">السرعة</span>
                        <span id="detailSpeed" class="font-bold text-slate-200">0 م/ث</span>
                    </div>
                    <div class="bg-slate-800/60 p-2 rounded-lg border border-slate-700/50">
                        <span class="text-slate-400 block text-[10px]">حالة الارتداء</span>
                        <span id="detailWorn" class="font-bold text-slate-200">نعم</span>
                    </div>
                    <div class="bg-slate-800/60 p-2 rounded-lg border border-slate-700/50">
                        <span class="text-slate-400 block text-[10px]">التحديث</span>
                        <span id="detailTime" class="font-bold text-slate-200">--:--:--</span>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- كود JavaScript الخاص بك كاملاً -->
    <script>
        // إدارة حالة التطبيق (State Management)
        let state = {
            employees: [],
            filteredEmployees: [],
            selectedEmployeeId: null,
            searchQuery: '',
            isMuted: false,
            apiUrl: 'https://script.google.com/macros/s/AKfycbznf_WNaBMMbHnR1ZiP8QLG2BX80rU__OjlYs3_kWFirLfGVGo2toe0wKOOGAZxYUNthA/exec',
            autoRefresh: true,
            refreshIntervalId: null,
            audioContext: null,
            sirenIntervalId: null
        };

        // حاوية معرّفات الدبابيس على الخريطة لمنع إعادة إنشائها وتفادي الوميض
        const mapMarkers = {};
        let map = null;

        // تهيئة التطبيق عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            initEventListeners();
            lucide.createIcons();
            
            // جلب أول دفعة بيانات
            fetchTelemetryData();
            
            // بدء التحديث التلقائي
            toggleAutoRefresh(true);
        });

        // تهيئة خريطة Leaflet
        function initMap() {
            // الرياض كإحداثيات افتراضية للمركز
            map = L.map('map', {
                zoomControl: false // سنضيفه لاحقاً في مكان مخصص
            }).setView([24.7136, 46.6753], 12);

            // إضافة أزرار التحكم بالتقريب في موقع مناسب
            L.control.zoom({ position: 'topleft' }).addTo(map);

            // استخدام طبقة خريطة داكنة احترافية مناسبة لغرف العمليات الأمنية (CartoDB Dark Matter)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        // تهيئة مستمعي الأحداث (Event Listeners)
        function initEventListeners() {
            // البحث
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value.trim().toLowerCase();
                filterEmployees();
            });

            // تبديل التحديث التلقائي
            const autoRefreshToggle = document.getElementById('autoRefreshToggle');
            autoRefreshToggle.addEventListener('change', (e) => {
                toggleAutoRefresh(e.target.checked);
            });

            // كتم/تفعيل صوت الإنذار
            const muteAlarmBtn = document.getElementById('muteAlarmBtn');
            muteAlarmBtn.addEventListener('click', toggleMute);

            // إغلاق لوحة التفاصيل
            const closeDetailBtn = document.getElementById('closeDetailBtn');
            closeDetailBtn.addEventListener('click', deselectEmployee);

            // تحديث رابط الـ API يدوياً
            const apiUrlInput = document.getElementById('apiUrlInput');
            apiUrlInput.addEventListener('change', (e) => {
                const val = e.target.value.trim();
                if (val) {
                    state.apiUrl = val;
                    fetchTelemetryData();
                }
            });
        }

        // جلب البيانات الحية من Google Apps Script Web App
        async function fetchTelemetryData() {
            const indicator = document.getElementById('refreshIndicator');
            indicator.classList.add('refreshing');

            try {
                const response = await fetch(state.apiUrl);
                if (!response.ok) {
                    throw new Error(`خطأ في خادم البيانات: ${response.status}`);
                }

                const rawData = await response.json();

                // تصفية السجلات الفارغة والتأكد من وجود اسم للموظف ومعرّف، ومنع البيانات التالفة
                state.employees = rawData.filter(emp => {
                    const id = (emp.emp_id || '').toString().trim();
                    const name = (emp.emp_name || '').toString().trim();
                    
                    // يجب أن يحتوي السجل على معرف أو اسم
                    if (!id && !name) return false;
                    
                    // استبعاد السجلات التي تحتوي على أكواد برمجية لتفادي إفساد التخطيط
                    if (id.startsWith('//') || name.startsWith('//') || id.startsWith('/*') || name.startsWith('/*') || 
                        id.includes('package ') || name.includes('package ') || id.includes('import ') || name.includes('import ') ||
                        id.length > 50 || id.length > 30) {
                        return false;
                    }
                    return true;
                }).map(emp => {
                    // معالجة القيم الافتراضية
                    return {
                        timestamp: emp.timestamp || new Date().toISOString(),
                        emp_id: emp.emp_id || 'N/A',
                        emp_name: emp.emp_name || 'موظف غير معروف',
                        lat: parseFloat(emp.lat) || 24.7136,
                        lng: parseFloat(emp.lng) || 46.6753,
                        speed: emp.speed !== '' ? parseFloat(emp.speed).toFixed(1) : '0.0',
                        heart_rate: emp.heart_rate !== '' ? parseInt(emp.heart_rate) : 0,
                        steps: emp.steps !== '' ? parseInt(emp.steps) : 0,
                        battery: emp.battery ? emp.battery.toString().replace('%', '') + '%' : '100%',
                        is_worn: emp.is_worn === 'YES' || emp.is_worn === true ? 'نعم' : 'لا',
                        status: (emp.status || 'NORMAL').toUpperCase(),
                        nearest_responder: emp.nearest_responder || 'لا يوجد'
                    };
                });

                // تحديث الفلترة
                filterEmployees();
                // تحديث الإحصائيات
                updateStats();
                // تحديث الدبابيس على الخريطة
                updateMapMarkers();
                // التحقق من بلاغات الـ SOS النشطة وتفعيل الإنذار
                checkSosAlerts();

                // تحديث لوحة التفاصيل إذا كان هناك موظف محدد مفتوح حالياً
                if (state.selectedEmployeeId) {
                    const currentEmp = state.employees.find(e => e.emp_id === state.selectedEmployeeId);
                    if (currentEmp) {
                        showEmployeeDetails(currentEmp);
                    }
                }

            } catch (error) {
                console.error('حدث خطأ أثناء جلب البيانات:', error);
                const listContainer = document.getElementById('employeeList');
                listContainer.innerHTML = `<div class="text-center text-red-400 p-4 text-xs">فشل الاتصال بالسيرفر. تأكد من إعدادات الرابط والإنترنت.</div>`;
            } finally {
                setTimeout(() => {
                    indicator.classList.remove('refreshing');
                }, 600);
            }
        }

        // تصفية قائمة الموظفين بناءً على البحث
        function filterEmployees() {
            if (!state.searchQuery) {
                state.filteredEmployees = [...state.employees];
            } else {
                state.filteredEmployees = state.employees.filter(emp => {
                    return emp.emp_name.toLowerCase().includes(state.searchQuery) ||
                           emp.emp_id.toLowerCase().includes(state.searchQuery);
                });
            }

            // إعادة ترتيب القائمة بحيث تظهر حالات SOS في البداية ثم WARNING ثم NORMAL
            state.filteredEmployees.sort((a, b) => {
                const priority = { 'SOS': 3, 'WARNING': 2, 'NORMAL': 1 };
                return (priority[b.status] || 0) - (priority[a.status] || 0);
            });

            renderEmployeeList();
        }

        // بناء وتحديث قائمة الموظفين الجانبية (UI)
        function renderEmployeeList() {
            const listContainer = document.getElementById('employeeList');
            
            if (state.filteredEmployees.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-slate-500 py-10 text-xs">لا يوجد نتائج تطابق البحث.</div>';
                return;
            }

            listContainer.innerHTML = '';

            state.filteredEmployees.forEach(emp => {
                const card = document.createElement('div');
                card.className = `employee-card ${state.selectedEmployeeId === emp.emp_id ? 'active-focus' : ''}`;
                card.setAttribute('data-id', emp.emp_id);

                let statusClass = 'status-normal';
                if (emp.status === 'WARNING') statusClass = 'status-warning';
                if (emp.status === 'SOS') statusClass = 'status-sos';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-sm text-slate-100">${escapeHTML(emp.emp_name)}</span>
                        <span class="text-[10px] px-2 py-0.5 rounded font-bold ${emp.status === 'SOS' ? 'bg-red-600 text-white animate-pulse' : (emp.status === 'WARNING' ? 'bg-amber-500/20 text-amber-400' : 'bg-emerald-500/20 text-emerald-400')}">
                            ${escapeHTML(emp.status)}
                        </span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-slate-400 mt-2">
                        <span class="flex items-center gap-1">❤️ ${emp.heart_rate} BPM</span>
                        <span class="flex items-center gap-1">🔋 ${escapeHTML(emp.battery)}</span>
                        <span class="text-[10px] text-slate-500">#${escapeHTML(emp.emp_id)}</span>
                    </div>
                `;

                // حدث النقر على الكارت لتحديد وتوسيط الخريطة
                card.addEventListener('click', () => {
                    focusOnEmployee(emp);
                });

                listContainer.appendChild(card);
            });

            lucide.createIcons();
        }

        // تحديث لوحة الإحصائيات (Stats Cards)
        function updateStats() {
            const total = state.employees.length;
            const normal = state.employees.filter(e => e.status === 'NORMAL').length;
            const warning = state.employees.filter(e => e.status === 'WARNING').length;
            const sos = state.employees.filter(e => e.status === 'SOS').length;

            document.getElementById('statTotal').innerText = total;
            document.getElementById('statNormal').innerText = normal;
            document.getElementById('statWarning').innerText = warning;
            document.getElementById('statSos').innerText = sos;
        }

        // تحديث الدبابيس والمؤشرات على الخريطة
        function updateMapMarkers() {
            const activeIds = new Set(state.employees.map(e => e.emp_id));

            // 1. إزالة الدبابيس للموظفين الذين لم يعودوا في قائمة المراقبة الحالية
            for (const empId in mapMarkers) {
                if (!activeIds.has(empId)) {
                    map.removeLayer(mapMarkers[empId]);
                    delete mapMarkers[empId];
                }
            }

            // 2. تحديث أو إضافة الدبابيس
            state.employees.forEach(emp => {
                const latLng = [emp.lat, emp.lng];

                // تصميم الأيقونة المخصصة
                const customIcon = L.divIcon({
                    className: `custom-gps-marker ${emp.status.toLowerCase()}`,
                    html: ``,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                if (mapMarkers[emp.emp_id]) {
                    // تحديث الموقع والأيقونة الحالية لتفادي إعادة الإنشاء
                    mapMarkers[emp.emp_id].setLatLng(latLng);
                    mapMarkers[emp.emp_id].setIcon(customIcon);
                    mapMarkers[emp.emp_id].setPopupContent(buildPopupHTML(emp));
                } else {
                    // إنشاء دبوس جديد بالكامل
                    const marker = L.marker(latLng, { icon: customIcon })
                        .bindPopup(buildPopupHTML(emp))
                        .addTo(map);

                    // عند النقر على الدبوس، إظهار التفاصيل وتحديد العنصر
                    marker.on('click', () => {
                        selectEmployee(emp);
                    });

                    mapMarkers[emp.emp_id] = marker;
                }
            });
        }

        // بناء كود HTML للـ Popup الخاص بالدبوس على الخريطة
        function buildPopupHTML(emp) {
            let statusBadge = 'مستقر';
            if (emp.status === 'WARNING') statusBadge = 'تحذير حركة';
            if (emp.status === 'SOS') statusBadge = 'طوارئ SOS';

            return `
                <div dir="rtl" class="p-1 font-sans text-xs">
                    <b class="text-sm text-white block mb-1">${escapeHTML(emp.emp_name)}</b>
                    <span class="text-slate-400 block mb-1">رقم: ${escapeHTML(emp.emp_id)}</span>
                    <span class="block mb-1">الحالة: <b class="${emp.status === 'SOS' ? 'text-red-400' : 'text-emerald-400'}">${statusBadge}</b></span>
                    <span class="block mb-1">النبض: ${emp.heart_rate} BPM</span>
                    <span class="block">البطارية: ${escapeHTML(emp.battery)}</span>
                </div>
            `;
        }

        // التركيز على موظف محدد وتوسيط الخريطة عليه
        function focusOnEmployee(emp) {
            selectEmployee(emp);
            
            // نقل الخريطة إلى إحداثيات الموظف
            map.setView([emp.lat, emp.lng], 16, {
                animate: true,
                duration: 1.2
            });

            // فتح الـ Popup الخاص به
            if (mapMarkers[emp.emp_id]) {
                mapMarkers[emp.emp_id].openPopup();
            }
        }

        // تحديد موظف وعرض بياناته في لوحة التفاصيل
        function selectEmployee(emp) {
            state.selectedEmployeeId = emp.emp_id;

            // تفعيل التحديد البصري في القائمة الجانبية
            document.querySelectorAll('.employee-card').forEach(card => {
                if (card.getAttribute('data-id') === emp.emp_id) {
                    card.classList.add('active-focus');
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    card.classList.remove('active-focus');
                }
            });

            // إظهار لوحة التفاصيل العائمة وتحديث محتواها
            showEmployeeDetails(emp);
        }

        // تحديث وعرض لوحة التفاصيل العائمة (UI)
        function showEmployeeDetails(emp) {
            const panel = document.getElementById('detailPanel');
            panel.classList.remove('hidden');

            // تحديث المحتوى النصي
            document.getElementById('detailName').innerText = emp.emp_name;
            document.getElementById('detailId').innerText = `#${emp.emp_id}`;
            document.getElementById('detailHeartRate').innerText = `${emp.heart_rate} BPM`;
            document.getElementById('detailSteps').innerText = `${emp.steps.toLocaleString()} خطوة`;
            document.getElementById('detailBattery').innerText = emp.battery;
            document.getElementById('detailSpeed').innerText = `${emp.speed} م/ث`;
            document.getElementById('detailWorn').innerText = emp.is_worn;

            // معالجة تنسيق الوقت
            let timeString = '--:--:--';
            try {
                const date = new Date(emp.timestamp);
                timeString = date.toLocaleTimeString('ar-SA', { hour12: false });
            } catch(e) {}
            document.getElementById('detailTime').innerText = timeString;

            // ضبط نقطة الحالة الملونة
            const dot = document.getElementById('detailStatusDot');
            dot.className = `status-dot ${emp.status.toLowerCase()}`;

            // معالجة تفاصيل المستجيب (إذا كانت الحالة طوارئ SOS)
            const responderBox = document.getElementById('responderBox');
            if (emp.status === 'SOS') {
                responderBox.classList.remove('hidden');
                document.getElementById('detailResponder').innerText = emp.nearest_responder;
            } else {
                responderBox.classList.add('hidden');
            }
        }

        // إلغاء تحديد الموظف وإغلاق لوحة التفاصيل
        function deselectEmployee() {
            state.selectedEmployeeId = null;
            document.getElementById('detailPanel').classList.add('hidden');
            document.querySelectorAll('.employee-card').forEach(card => {
                card.classList.remove('active-focus');
            });
        }

        // التحكم في تشغيل التحديث التلقائي
        function toggleAutoRefresh(enable) {
            state.autoRefresh = enable;
            if (enable) {
                if (!state.refreshIntervalId) {
                    state.refreshIntervalId = setInterval(fetchTelemetryData, 3000);
                }
            } else {
                if (state.refreshIntervalId) {
                    clearInterval(state.refreshIntervalId);
                    state.refreshIntervalId = null;
                }
            }
        }

        // التحقق من وجود حالات طوارئ نشطة وبدء الإنذار
        function checkSosAlerts() {
            const sosEmployees = state.employees.filter(e => e.status === 'SOS');
            const banner = document.getElementById('sosBanner');

            if (sosEmployees.length > 0) {
                banner.classList.remove('hidden');
                const details = sosEmployees.map(e => `${e.emp_name} (أقرب مستجيب: ${e.nearest_responder})`).join(' | ');
                document.getElementById('sosBannerMessage').innerText = `طوارئ نشطة لـ: ${details}`;
                
                // تشغيل صوت التنبيه
                playAlarmSiren();
            } else {
                banner.classList.add('hidden');
                stopAlarmSiren();
            }
        }

        // توليد صوت الإنذار عبر الـ Web Audio API لتجنب تحميل ملف خارجي
        function playAlarmSiren() {
            if (state.isMuted) return;

            if (!state.audioContext) {
                state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (state.sirenIntervalId) return; // الإنذار يعمل بالفعل

            state.sirenIntervalId = setInterval(() => {
                if (state.audioContext.state === 'suspended') {
                    state.audioContext.resume();
                }

                const osc = state.audioContext.createOscillator();
                const gain = state.audioContext.createGain();

                osc.connect(gain);
                gain.connect(state.audioContext.destination);

                osc.type = 'sawtooth';
                const time = state.audioContext.currentTime;

                osc.frequency.setValueAtTime(580, time);
                osc.frequency.linearRampToValueAtTime(880, time + 0.35);

                gain.gain.setValueAtTime(0.12, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);

                osc.start(time);
                osc.stop(time + 0.38);
            }, 450);
        }

        // إيقاف صوت الإنذار
        function stopAlarmSiren() {
            if (state.sirenIntervalId) {
                clearInterval(state.sirenIntervalId);
                state.sirenIntervalId = null;
            }
        }

        // كتم/تفعيل صوت الإنذار من زر لوحة الإنذار
        function toggleMute() {
            state.isMuted = !state.isMuted;
            const muteIcon = document.getElementById('muteIcon');
            if (state.isMuted) {
                muteIcon.setAttribute('data-lucide', 'volume-x');
                stopAlarmSiren();
            } else {
                muteIcon.setAttribute('data-lucide', 'volume-2');
                checkSosAlerts();
            }
            lucide.createIcons();
        }

        // دالة لتطهير نصوص HTML لمنع اختراق تخطيط الصفحة (XSS / Layout Spillage Protection)
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
